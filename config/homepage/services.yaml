# Manual (non-container) tiles; container services come from `homepage.*` labels. Keep the
# file present (a missing one is regenerated with demo tiles); use `[]` to show none. Icons
# are served locally (/icons/*) for the air-gapped LAN.
- Links:
    - Google:
        href: https://google.com
        description: Search
        icon: /icons/google.svg
        target: _blank
        siteMonitor: https://google.com  # tile shows HTTP response time in ms
    - Yahoo:
        href: https://yahoo.com
        description: Web portal
        icon: /icons/yahoo.svg
        target: _blank
        ping: yahoo.com
