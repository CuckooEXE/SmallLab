# Forgejo Actions runner config (mounted read-only at /data/config.yaml). The .runner
# registration file is written next to it by bootstrap.sh. Full example:
#   docker run --rm data.forgejo.org/forgejo/runner:9.1.1 forgejo-runner generate-config
log:
  level: info

runner:
  file: /data/.runner
  capacity: 2          # how many jobs run at once
  timeout: 1h
  fetch_timeout: 5s
  # A LABEL maps a workflow's `runs-on:` to HOW the job runs:
  #   <label>:docker://<image>  -> run the job inside <image> (must exist locally, air-gapped)
  #   <label>:host              -> run directly on the runner host (no container)
  labels:
    - "docker:docker://node:22-bookworm"
    - "host:host"

cache:
  enabled: true        # gives workflows ACTIONS_CACHE_URL (actions/cache)

container:
  # Run jobs on the caddy network so they reach the forge at http://forgejo:3000.
  network: caddy
  # Never pull a missing job image -- it must already be on the host (air-gap).
  force_pull: false
  # Allow workflows to bind-mount host paths.
  valid_volumes:
    - '**'
