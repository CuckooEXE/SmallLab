# Curl-friendly file drop for the .lab share -- stock nginx.
#
#   GET / HEAD            -> static file serving + autoindex HTML directory listings
#   PUT                   -> upload a file (missing parent dirs are auto-created)
#   DELETE                -> remove a file (or an empty directory)
#   MKCOL / COPY / MOVE   -> standard WebDAV collection ops
#   POST                  -> not supported by nginx's WebDAV module
#
# No authentication: flat trusted LAN, matching the samba + filebrowser setup.
# Runs as uid:gid 100:101 (set in compose) so files match Samba's smbuser.

worker_processes auto;
error_log  /dev/stderr  warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    access_log    /dev/stdout;

    # Flat trusted LAN -> no upload size cap. The body temp dir MUST sit on the SAME
    # filesystem as /srv: a PUT is written here and then renamed into place, and a
    # rename across filesystems fails. Keeping it under /srv guarantees a local rename
    # (and never leaves a half-written file visible in a listing).
    client_max_body_size   0;
    client_body_temp_path  /srv/.uploadtmp 1 2;

    # Keep the other temp paths off the root-owned image prefix so we can run non-root.
    proxy_temp_path    /tmp/proxy;
    fastcgi_temp_path  /tmp/fastcgi;
    uwsgi_temp_path    /tmp/uwsgi;
    scgi_temp_path     /tmp/scgi;

    server {
        listen      8080;
        server_name _;
        root        /srv;

        location / {
            # Reads: static files + HTML directory listings.
            autoindex            on;
            autoindex_exact_size off;
            autoindex_localtime  on;

            # Writes: stock WebDAV module -- PUT / DELETE / MKCOL / COPY / MOVE (no POST).
            dav_methods          PUT DELETE MKCOL COPY MOVE;
            create_full_put_path on;                      # `curl -T f .../a/b/c` just works
            dav_access           user:rw group:rw all:r;  # 0664, matches Samba's smbuser
        }
    }
}
