# tldr InBrowser.App -- static Vue PWA served by stock nginx (mounted over the image's
# default conf.d/default.conf, so it slots into the stock http{} block).
#
# History-mode SPA: real files (the hashed assets, the bundled tldr-pages.zip, the service
# worker) are served directly by try_files; anything else falls back to the app shell so a
# deep link like /pages/common/tar survives a hard refresh / cold load before the SW is live.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
