# JSON Crack -- static Next.js export. Try the exact file, its .html, the directory, then the app
# shell so a client-side route survives a hard refresh.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
