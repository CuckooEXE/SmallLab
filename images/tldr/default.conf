# tldr InBrowser.App -- history-mode SPA. Real files (hashed assets, the bundled tldr-pages.zip,
# the service worker) are served directly; anything else falls back to the app shell so a deep
# link survives a hard refresh / cold load before the service worker is live.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
