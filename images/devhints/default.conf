# DevHints is an Astro build with build.format: 'file' -- pages ship as <name>.html but are
# linked extensionless (/css, /react, /polyfill.io). Stock nginx 404s those, so resolve a bare
# path to its .html file (and directories to their index), matching how GitHub Pages served it.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
