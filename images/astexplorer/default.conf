# AST Explorer -- single-page app. Hashed assets and lazily-loaded parser chunks are served
# directly; unknown paths fall back to the app shell.
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
