# x86 -- offline x86/x64 instruction-set reference (x86.lab). Self-contained image mirroring
# c9x.me/x86, built by ./build-refs.sh. Read-only, no state.
services:
  x86:
    image: lab/x86:latest
    container_name: x86
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: x86.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: x86 Instructions
      homepage.icon: /icons/x86.svg
      homepage.href: https://x86.${LAB_DOMAIN}
      homepage.description: x86/x64 ISA reference (c9x.me)
      homepage.weight: "33"
