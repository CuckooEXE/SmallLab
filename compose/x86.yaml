# x86 instruction-set reference, served offline (x86.lab). A static mirror of c9x.me/x86/
# (the x86/x64 instruction reference), staged into volumes/x86 by ./fetch-docs.sh during the
# online provisioning window. Stock nginx over the static mirror; read-only, no state.
services:
  x86:
    image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10  # nginx:1.27-alpine
    container_name: x86
    restart: unless-stopped
    volumes:
      - ../volumes/x86:/usr/share/nginx/html:ro
    networks:
      - caddy
    labels:
      caddy: x86.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: x86 Instructions
      homepage.icon: /icons/x86.svg
      homepage.href: https://x86.${LAB_DOMAIN}
      homepage.description: x86/x64 ISA reference (c9x.me)
      homepage.weight: "33"
