# LOLBAS -- offline Windows living-off-the-land reference (lolbas.lab). Self-contained image:
# the upstream Jekyll site built from source by ./build-refs.sh. Read-only, no state.
services:
  lolbas:
    image: lab/lolbas:latest
    container_name: lolbas
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: lolbas.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: LOLBAS
      homepage.icon: /icons/lolbas.svg
      homepage.href: https://lolbas.${LAB_DOMAIN}
      homepage.description: Windows living-off-the-land binaries
      homepage.weight: "36"
