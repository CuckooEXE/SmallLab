# DevDocs -- offline API documentation browser (devdocs.lab). The image bakes in the full
# docset catalog (Python, C, Linux man pages, hundreds more); no download step, no volume.
services:
  devdocs:
    image: ghcr.io/freecodecamp/devdocs:latest
    container_name: devdocs
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: devdocs.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 9292}}"
      homepage.group: Reference
      homepage.name: DevDocs
      homepage.icon: /icons/devdocs.svg
      homepage.href: https://devdocs.${LAB_DOMAIN}
      homepage.description: Offline API documentation
      homepage.weight: "30"
