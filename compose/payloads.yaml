# PayloadsAllTheThings -- offline payload/technique reference (payloads.lab). Self-contained
# image: the repo's own mkdocs-material site built from source by ./build.sh (offline
# search kept). Read-only, no state.
services:
  payloads:
    image: lab/payloads:latest
    container_name: payloads
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: payloads.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: PayloadsAllTheThings
      homepage.icon: /icons/payloads.svg
      homepage.href: https://payloads.${LAB_DOMAIN}
      homepage.description: Payloads & techniques by class
      homepage.weight: "37"
