# SMB file share at \\files.lab\lab -- passwordless guest access (no SMB auth).
services:
  samba:
    image: dperson/samba@sha256:66088b78a19810dd1457a8f39340e95e663c728083efa5fe7dc0d40b2478e869  # :latest pinned 2026-06
    container_name: samba
    restart: unless-stopped
    # Passwordless guest share: unauthenticated clients map to guest and `force user = smbuser`
    # owns what they write. Windows clients need AllowInsecureGuestAuth; Linux needs `-o guest`.
    command: >
      -s "lab;/share;yes;no;yes"
      -g "server min protocol = SMB2"
      -p
    ports:
      - "${HOST_IP}:445:445/tcp"
      - "${HOST_IP}:139:139/tcp"
    volumes:
      - ../volumes/share:/share
    networks:
      - backend
    labels:
      homepage.group: Storage & Packages
      homepage.name: Samba
      homepage.icon: /icons/samba.png
      homepage.description: 'SMB share at \\files.${LAB_DOMAIN}\lab'
      homepage.weight: "30"
