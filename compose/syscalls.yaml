# Linux Syscall Tables -- offline x86-64 syscall reference (syscalls.lab). Self-contained image
# built from mebeim/linux-syscalls (Systrack): x86-64 tables by kernel version (v4.0-v6.17) with
# full signatures -- arg names, C types, and registers. Built by ./build-refs.sh. Read-only, no state.
services:
  syscalls:
    image: lab/syscalls:latest
    container_name: syscalls
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: syscalls.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: Syscall Tables
      homepage.icon: /icons/syscalls.svg
      homepage.href: https://syscalls.${LAB_DOMAIN}/?table=x86/64/x64/latest
      homepage.description: x86-64 syscalls by kernel version
      homepage.weight: "38"
