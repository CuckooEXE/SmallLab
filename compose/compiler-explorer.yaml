# Compiler Explorer / Godbolt -- interactive source-to-asm (godbolt.lab). Bundles a set of
# C/C++ compilers; offline you get what's baked in ("fetch more compilers" needs internet).
services:
  compiler-explorer:
    image: madduci/docker-compiler-explorer:latest
    container_name: compiler-explorer
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: godbolt.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 10240}}"
      homepage.group: Tools
      homepage.name: Compiler Explorer
      homepage.icon: /icons/compiler-explorer.svg
      homepage.href: https://godbolt.${LAB_DOMAIN}
      homepage.description: Godbolt -- source to asm
      homepage.weight: "35"
