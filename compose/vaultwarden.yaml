# Vaultwarden -- Bitwarden-compatible secrets vault (vault.lab). DB + attachments persist
# under volumes/vaultwarden (/data); runs as root. DOMAIN must match the public URL.
services:
  vaultwarden:
    image: vaultwarden/server@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c  # 1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://vault.${LAB_DOMAIN}
      - SIGNUPS_ALLOWED=true               # open for first signup; set false afterward
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-}   # admin panel enabled only when set in .env
    volumes:
      - ../volumes/vaultwarden:/data
    networks:
      - caddy
    labels:
      caddy: vault.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Tools
      homepage.name: Vaultwarden
      homepage.icon: /icons/vaultwarden.png
      homepage.href: https://vault.${LAB_DOMAIN}
      homepage.description: Bitwarden-compatible vault
      homepage.weight: "60"
