# Uptime / status monitoring (https://status.lab). Watches HTTP, TCP, DNS and -- handy
# with step-ca's 90-day certs -- TLS expiry on every *.lab endpoint. State (monitors,
# history, the first-run admin account) persists under volumes/uptime-kuma (-> /app/data).
# NODE_EXTRA_CA_CERTS makes Node trust the lab root CA so monitoring https://*.lab verifies
# instead of erroring. bootstrap.sh drops the exported CA at that path (inside the data
# volume, so it persists) and restarts this service. Until bootstrap runs the file is
# absent and Node just logs a harmless "can't load" warning -- no other effect.
services:
  uptime-kuma:
    image: louislam/uptime-kuma@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9  # v1 (tag :1) pinned 2026-06
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      - NODE_EXTRA_CA_CERTS=/app/data/lab-root-ca.crt
    volumes:
      - ../volumes/uptime-kuma:/app/data
    networks:
      - caddy
    labels:
      caddy: status.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3001}}"
      homepage.group: Infrastructure
      homepage.name: Uptime Kuma
      homepage.icon: uptime-kuma.png
      homepage.href: https://status.${LAB_DOMAIN}
      homepage.description: Service status monitoring
      homepage.weight: "50"
