# Technitium -- authoritative DNS for *.lab + recursive forwarder (dns.lab).
services:
  technitium:
    image: technitium/dns-server@sha256:99c250f0ee494f2f31e09a76d83f8213bc4c5d6f106b0895cd5f327518469c48  # :latest pinned 2026-06
    container_name: technitium
    hostname: technitium
    restart: unless-stopped
    environment:
      - DNS_SERVER_DOMAIN=ns.${LAB_DOMAIN}
      - DNS_SERVER_ADMIN_PASSWORD=${LAB_PASSWORD}   # shared lab login (its admin user is fixed as "admin")
      - DNS_SERVER_FORWARDERS=1.1.1.1, 9.9.9.9   # so clients still reach the internet
      - DNS_SERVER_WEB_SERVICE_HTTP_PORT=5380
    ports:
      # DNS itself, on the LAN IP (leaves 127.0.0.53 free for systemd-resolved)
      - "${HOST_IP}:53:53/udp"
      - "${HOST_IP}:53:53/tcp"
      # Admin/API on loopback for bootstrap.sh; LAN users reach it via dns.${LAB_DOMAIN}
      - "127.0.0.1:5380:5380/tcp"
    volumes:
      - ../volumes/technitium:/etc/dns
    networks:
      - caddy
    labels:
      caddy: dns.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5380}}"
      homepage.group: Infrastructure
      homepage.name: Technitium DNS
      homepage.icon: /icons/technitium.png
      homepage.href: https://dns.${LAB_DOMAIN}
      homepage.description: Authoritative DNS for *.${LAB_DOMAIN}
      homepage.weight: "20"
