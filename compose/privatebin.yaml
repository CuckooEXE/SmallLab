# PrivateBin -- client-side-encrypted pastebin (paste.lab); the server stores only ciphertext.
# Pastes persist under volumes/privatebin (/srv/data); php-fpm runs as uid 65534/gid 82, so
# that dir must be owned 65534:82.
services:
  privatebin:
    image: privatebin/nginx-fpm-alpine@sha256:f4a6e55a7410a6640411cdf532d43f6206d147ed63da484ea0a02c3afaf5a6c0  # 2.0.4
    container_name: privatebin
    restart: unless-stopped
    volumes:
      - ../volumes/privatebin:/srv/data
    networks:
      - caddy
    labels:
      caddy: paste.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Tools
      homepage.name: PrivateBin
      homepage.icon: /icons/privatebin.png
      homepage.href: https://paste.${LAB_DOMAIN}
      homepage.description: Encrypted pastebin
      homepage.weight: "50"
