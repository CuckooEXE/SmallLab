# File share over HTTP (curl) -- stock nginx over the SAME share as Samba/FileBrowser,
# so you can GET/PUT/DELETE files with plain curl: curl -T ./f https://dav.lab/some/dir/
# nginx's built-in WebDAV module covers PUT/DELETE/MKCOL/COPY/MOVE; GET/HEAD serve files
# and HTML directory listings (autoindex). POST is not supported by the module.
# Config is config/nginx/nginx.conf. Runs as 100:101 (Samba's smbuser) so files dropped
# over HTTP are interoperable with the SMB share. No auth.
services:
  webdav:
    image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10  # nginx:1.27-alpine
    container_name: webdav
    restart: unless-stopped
    user: "100:101"
    volumes:
      - ../volumes/share:/srv
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - caddy
    labels:
      caddy: dav.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Storage & Packages
      homepage.name: WebDAV (curl)
      homepage.icon: /icons/nginx.png
      homepage.href: https://dav.${LAB_DOMAIN}
      homepage.description: curl GET/PUT/DELETE to the share
      homepage.weight: "25"
