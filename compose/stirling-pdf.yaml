# Stirling-PDF -- offline PDF toolbox: upload a PDF, OCR it, extract text (pdf.lab). Telemetry and
# login are disabled; Stateless (config is via env), so no volume. OCR languages ship in the custom
# lab/ image built from images/stirling-pdf/ (upstream's eng/deu/fra/por/chi_sim plus the extra
# tesseract-ocr-<lang> packs listed in that Dockerfile). Add languages by editing that package list.
services:
  stirling-pdf:
    image: lab/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    environment:
      - SYSTEM_ENABLEANALYTICS=false
      - SYSTEM_ENABLESCARF=false
      - SYSTEM_ENABLEPOSTHOG=false
      - DISABLE_ADDITIONAL_FEATURES=true
      - SECURITY_ENABLELOGIN=false
      - METRICS_ENABLED=false
      - SHOW_SURVEY=false
    networks:
      - caddy
    labels:
      caddy: pdf.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Tools
      homepage.name: Stirling-PDF
      homepage.icon: /icons/stirling-pdf.svg
      homepage.href: https://pdf.${LAB_DOMAIN}
      homepage.description: PDF toolbox -- OCR & extract text
      homepage.weight: "54"
