# IT-Tools -- offline dev / crypto / network utilities (tools.lab).
services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: tools.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Tools
      homepage.name: IT-Tools
      homepage.icon: /icons/it-tools.png
      homepage.href: https://tools.${LAB_DOMAIN}
      homepage.description: Dev / crypto / network utilities, offline
      homepage.weight: "20"
