# PlantUML Server -- offline UML-from-text renderer (plantuml.lab). Renders entirely on-box
# (Graphviz + fonts bundled in the image); SANDBOX blocks diagram-driven network includes.
services:
  plantuml:
    image: plantuml/plantuml-server@sha256:5b9968b8723e03ef585396b257127337ca5f91e58ccbffc88f085bd649a717dc  # :jetty pinned 2026-06
    container_name: plantuml
    restart: unless-stopped
    environment:
      - PLANTUML_SECURITY_PROFILE=SANDBOX
    networks:
      - caddy
    labels:
      caddy: plantuml.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Tools
      homepage.name: PlantUML
      homepage.icon: /icons/plantuml.svg
      homepage.href: https://plantuml.${LAB_DOMAIN}
      homepage.description: Render UML diagrams from text
      homepage.weight: "50"
