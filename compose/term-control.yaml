# term-control -- on-demand browser terminals (https://terminal.lab).
#
# One instance of the shared, config-driven control plane (config/session-control/app.py),
# pointed at terminal.json. It creates / resumes / deletes per-session ttyd containers,
# each on its own subdomain <name>.terminal.lab (routed live by caddy-docker-proxy) from a
# baked profile image (profiles/term/ + build-profiles.sh). ttyd runs `tmux new -A -s main`,
# so a reconnect or a second tab reattaches the same session; /root persists under
# volumes/term/<name>/root.
#
# Same UNAUTHENTICATED, root-equivalent-socket posture as code-control -- put it behind
# auth first when you add it. (Code sibling: compose/code-control.yaml.)
services:
  term-control:
    image: python:3.12-slim-bookworm@sha256:76d4b7b6305788c6b4c6a19d6a22a3921bf802e9af4d5e1e5bd771208dba74bf
    container_name: term-control
    restart: unless-stopped
    command: ["python3", "/app/app.py"]
    environment:
      - LAB_DOMAIN=${LAB_DOMAIN}
      - CONTROL_FILE=/app/terminal.json
      - DATA_DIR=/data/term
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock      # create/stop/remove sessions
      - ../config/session-control:/app:ro               # shared app.py + terminal.json
      - ../volumes/term:/data/term                      # per-session /root volumes
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      caddy: terminal.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8000}}"
      homepage.group: Terminals
      homepage.name: Terminals
      homepage.icon: /icons/terminal.svg
      homepage.href: https://terminal.${LAB_DOMAIN}
      homepage.description: Spin up / tear down browser terminals
      homepage.weight: "20"
