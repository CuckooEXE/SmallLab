# term-control -- on-demand browser terminals (terminal.lab). The shared session-control
# app (config/session-control/app.py + terminal.json) creates/resumes/deletes per-session
# ttyd containers at <name>.terminal.lab from baked profiles (images/term-*); ttyd runs
# `tmux new -A -s main` so reconnects reattach, and /root persists under volumes/term/<name>/root.
# Drives the Docker socket; unauthenticated (LAN-trust).
services:
  term-control:
    image: python:3.12-slim-bookworm
    container_name: term-control
    restart: unless-stopped
    command: ["python3", "/app/app.py"]
    environment:
      - LAB_DOMAIN=${LAB_DOMAIN}
      - CONTROL_FILE=/app/terminal.json
      - DATA_DIR=/data/term
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock      # create/stop/remove sessions
      - ../config/session-control:/app:ro               # shared app.py + terminal.json
      - ../volumes/term:/data/term                      # per-session /root volumes
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      caddy: terminal.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8000}}"
      homepage.group: Terminals
      homepage.name: Terminals
      homepage.icon: /icons/terminal.svg
      homepage.href: https://terminal.${LAB_DOMAIN}
      homepage.description: Spin up / tear down browser terminals
      homepage.weight: "1"   # below the session tiles (weight 100) so the create tile sorts first
