# OpenGrok -- source cross-reference + full-text code search (grok.lab). A Tomcat webapp
# (8080) over a universal-ctags symbol index + Lucene full-text index. Read-only, anonymous.
# Drop source trees under volumes/opengrok/src/<name> with ./ingest-repos.sh; indexed on
# startup and every SYNC_PERIOD_MINUTES. Air-gapped: NOMIRROR blocks any pull from an SCM remote.
services:
  opengrok:
    image: opengrok/docker:1.14.15
    container_name: opengrok
    restart: unless-stopped
    environment:
      - SYNC_PERIOD_MINUTES=15   # incremental reindex cadence (also indexes once on startup); 0 = off
      - NOMIRROR=1               # never pull from an SCM remote (air-gap)
    volumes:
      # must stay writable: the entrypoint chowns it to uid 1111 on boot
      - ../volumes/opengrok/src:/opengrok/src      # source to index (./ingest-repos.sh writes here)
      - ../volumes/opengrok/data:/opengrok/data    # Lucene + xref index
      - ../volumes/opengrok/etc:/opengrok/etc      # generated configuration.xml (persisted)
    networks:
      - caddy
    healthcheck:
      # 200 once the webapp is deployed; surfaces crash-loops as unhealthy
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8080/api/v1/system/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s   # Tomcat deploy + first index
    labels:
      caddy: grok.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Tools
      homepage.name: OpenGrok
      homepage.icon: /icons/opengrok.svg
      homepage.href: https://grok.${LAB_DOMAIN}
      homepage.description: Code search & cross-reference
      homepage.weight: "36"
