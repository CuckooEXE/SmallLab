# Homepage -- dashboard; auto-discovers services from container labels.
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.${LAB_DOMAIN}
    volumes:
      - ../config/homepage:/app/config
      - ../config/homepage/icons:/app/public/icons:ro  # local icons -> served at /icons/* (offline)
      - /var/run/docker.sock:/var/run/docker.sock:ro   # live container status
    networks:
      - caddy
    labels:
      caddy: home.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3000}}"
      homepage.group: Infrastructure
      homepage.name: Homepage
      homepage.icon: /icons/homepage.png
      homepage.href: https://home.${LAB_DOMAIN}
      homepage.description: This dashboard
      homepage.weight: "30"
