# cppreference -- offline C/C++ standard library reference (cppref.lab). Self-contained image
# built from the PeterFeicht html-book by ./build.sh. Read-only, no state.
services:
  cppreference:
    image: lab/cppreference:latest
    container_name: cppreference
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: cppref.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: cppreference
      homepage.icon: /icons/cppreference.svg
      homepage.href: https://cppref.${LAB_DOMAIN}
      homepage.description: Offline C / C++ reference
      homepage.weight: "31"
