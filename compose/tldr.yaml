# tldr -- offline tldr-pages reference (tldr.lab). Self-contained image: the InBrowserApp PWA
# (with the tldr-pages archive baked in) plus its SPA nginx config, built by ./build.sh.
# Read-only, no state.
services:
  tldr:
    image: lab/tldr:latest
    container_name: tldr
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: tldr.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: tldr
      homepage.icon: /icons/tldr.svg
      homepage.href: https://tldr.${LAB_DOMAIN}
      homepage.description: Offline tldr-pages (command examples)
      homepage.weight: "32"
