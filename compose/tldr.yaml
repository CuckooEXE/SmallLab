# tldr -- offline tldr-pages reference (tldr.lab). A static Vue PWA whose build bakes the whole
# tldr-pages archive into the bundle; built + staged into volumes/tldr by ./fetch-docs.sh. nginx
# over the static build with its own SPA config (config/nginx/tldr.conf). Read-only, no state.
services:
  tldr:
    image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10  # nginx:1.27-alpine
    container_name: tldr
    restart: unless-stopped
    volumes:
      - ../volumes/tldr:/usr/share/nginx/html:ro
      - ../config/nginx/tldr.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - caddy
    labels:
      caddy: tldr.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: tldr
      homepage.icon: /icons/tldr.svg
      homepage.href: https://tldr.${LAB_DOMAIN}
      homepage.description: Offline tldr-pages (command examples)
      homepage.weight: "32"
