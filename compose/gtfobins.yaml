# GTFOBins -- offline Unix living-off-the-land reference (gtfobins.lab). Self-contained image:
# the upstream Jekyll site built from source by ./build.sh. Read-only, no state.
services:
  gtfobins:
    image: lab/gtfobins:latest
    container_name: gtfobins
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: gtfobins.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"
      homepage.group: Reference
      homepage.name: GTFOBins
      homepage.icon: /icons/gtfobins.svg
      homepage.href: https://gtfobins.${LAB_DOMAIN}
      homepage.description: Unix living-off-the-land binaries
      homepage.weight: "36"
