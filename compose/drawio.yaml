# drawio -- offline diagram editor (draw.lab). Fully client-side: no server state, no volume.
# Caddy proxies plain 8080 and terminates TLS.
services:
  drawio:
    image: jgraph/drawio:30.2.4
    container_name: drawio
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: draw.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      homepage.group: Tools
      homepage.name: drawio
      homepage.icon: /icons/drawio.png
      homepage.href: https://draw.${LAB_DOMAIN}
      homepage.description: Offline diagram editor
      homepage.weight: "40"
