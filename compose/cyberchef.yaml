# CyberChef -- offline data-mangling swiss army knife (cyberchef.lab).
services:
  cyberchef:
    image: mpepping/cyberchef:latest
    container_name: cyberchef
    restart: unless-stopped
    networks:
      - caddy
    labels:
      caddy: cyberchef.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8000}}"
      homepage.group: Tools
      homepage.name: CyberChef
      homepage.icon: /icons/cyberchef.png
      homepage.href: https://cyberchef.${LAB_DOMAIN}
      homepage.description: The cyber swiss army knife
      homepage.weight: "10"
