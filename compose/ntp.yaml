# NTP -- LAN time source for *.lab clients (ntp.lab = HOST_IP:123). chrony serves the host
# clock as a local stratum, so it answers even with no upstream (air-gapped). Correct time is
# required by step-ca (cert validity), Vaultwarden TOTP, and SMB/Kerberos. Does not step the
# host clock (no SYS_TIME) -- keep the host clock correct and the LAN inherits it.
services:
  ntp:
    image: cturra/ntp:latest
    container_name: ntp
    hostname: ntp
    restart: unless-stopped
    environment:
      # Upstreams used only when online; offline chrony serves local stratum 10. Override in .env.
      - NTP_SERVERS=${NTP_SERVERS:-pool.ntp.org}
    ports:
      - "${HOST_IP}:123:123/udp"
    networks:
      - backend
    labels:
      homepage.group: Infrastructure
      homepage.name: NTP (chrony)
      homepage.icon: /icons/ntp.svg
      homepage.description: Time sync for *.${LAB_DOMAIN} clients
      homepage.weight: "25"
