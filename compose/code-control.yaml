# code-control -- on-demand code-server workspaces (https://code.lab).
#
# One instance of the shared, config-driven control plane (config/session-control/app.py),
# pointed at code.json. It creates / resumes / deletes per-session code-server containers,
# each on its own subdomain <name>.code.lab (routed live by caddy-docker-proxy off the
# labels the service sets) from a baked profile image (profiles/code/ + build-profiles.sh),
# with a persistent project volume under volumes/code/<name>/project.
#
# It drives the Docker Engine API over the mounted socket (no shell, no pip deps).
# The endpoint is UNAUTHENTICATED by design for now -- the socket is root-
# equivalent, so put this behind auth first when you add it. (Terminal sibling:
# compose/term-control.yaml.)
services:
  code-control:
    image: python:3.12-slim-bookworm@sha256:76d4b7b6305788c6b4c6a19d6a22a3921bf802e9af4d5e1e5bd771208dba74bf
    container_name: code-control
    restart: unless-stopped
    command: ["python3", "/app/app.py"]
    environment:
      - LAB_DOMAIN=${LAB_DOMAIN}
      - CONTROL_FILE=/app/code.json
      - DATA_DIR=/data/code
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock      # create/stop/remove sessions
      - ../config/session-control:/app:ro               # shared app.py + code.json
      - ../volumes/code:/data/code                      # per-session project volumes
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      caddy: code.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8000}}"
      homepage.group: Workspaces
      homepage.name: Code Workspaces
      homepage.icon: /icons/code-server.svg
      homepage.href: https://code.${LAB_DOMAIN}
      homepage.description: Spin up / tear down code-server sessions
      # Pin this "create" tile to the TOP of the Workspaces group. Homepage sorts a group by
      # weight ascending, and session tiles are stamped weight 100 (code.json ->
      # homepage_weight, applied by app.py), so this must stay well below that.
      homepage.weight: "1"
