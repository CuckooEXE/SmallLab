# code-control -- on-demand code-server workspaces (code.lab). The shared session-control
# app (config/session-control/app.py + code.json) creates/resumes/deletes per-session
# containers at <name>.code.lab from baked profiles (profiles/code/), each with a project
# volume under volumes/code/<name>/project. Drives the Docker socket; unauthenticated (LAN-trust).
services:
  code-control:
    image: python:3.12-slim-bookworm@sha256:76d4b7b6305788c6b4c6a19d6a22a3921bf802e9af4d5e1e5bd771208dba74bf
    container_name: code-control
    restart: unless-stopped
    command: ["python3", "/app/app.py"]
    environment:
      - LAB_DOMAIN=${LAB_DOMAIN}
      - CONTROL_FILE=/app/code.json
      - DATA_DIR=/data/code
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock      # create/stop/remove sessions
      - ../config/session-control:/app:ro               # shared app.py + code.json
      - ../volumes/code:/data/code                      # per-session project volumes
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      caddy: code.${LAB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8000}}"
      homepage.group: Workspaces
      homepage.name: Code Workspaces
      homepage.icon: /icons/code-server.svg
      homepage.href: https://code.${LAB_DOMAIN}
      homepage.description: Spin up / tear down code-server sessions
      homepage.weight: "1"   # below the session tiles (weight 100) so the create tile sorts first
