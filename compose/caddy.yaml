# reverse proxy -- terminates all https://*.lab, auto-configured from container labels.
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"        # HTTP/3
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../volumes/caddy/data:/data
      - ../volumes/caddy/config:/config
      - ../volumes/stepca:/stepca:ro   # read step-ca's root so we trust the ACME endpoint
    depends_on:
      step-ca:
        condition: service_healthy   # wait until step-ca has written its root CA
    networks:
      - caddy
    labels:
      # Global options (no site key): every site gets its certs from step-ca's ACME endpoint.
      caddy.acme_ca: https://step-ca:9000/acme/acme/directory
      caddy.acme_ca_root: /stepca/certs/root_ca.crt
      homepage.group: Infrastructure
      homepage.name: Caddy
      homepage.icon: /icons/caddy.png
      homepage.href: https://home.${LAB_DOMAIN}
      homepage.description: TLS reverse proxy
      homepage.weight: "10"
