# .lab homelab stack -- root compose file. Services are split one-per-file under compose/
# and merged via `include:`; shared networks are declared here. Bring it up from this dir:
#   docker compose up -d && ./bootstrap.sh

name: lab

include:
  - compose/caddy.yaml
  - compose/step-ca.yaml
  - compose/homepage.yaml
  - compose/technitium.yaml
  - compose/ntp.yaml
  - compose/dhcp.yaml   # opt-in (--profile dhcp)
  - compose/forgejo.yaml
  - compose/forgejo-runner.yaml   # Actions CI runner (registered by bootstrap.sh)
  - compose/minio.yaml
  - compose/samba.yaml
  - compose/filebrowser.yaml
  - compose/webdav.yaml
  - compose/cyberchef.yaml
  - compose/it-tools.yaml
  - compose/devdocs.yaml
  - compose/drawio.yaml
  - compose/privatebin.yaml
  - compose/vaultwarden.yaml
  - compose/dozzle.yaml
  - compose/compiler-explorer.yaml # Godbolt -- source to asm
  - compose/code-control.yaml      # on-demand code-server workspaces (code.lab)
  - compose/term-control.yaml      # on-demand browser terminals (terminal.lab)
  - compose/opengrok.yaml          # code search + cross-reference (./ingest-repos.sh)
  # Offline programming references (staged by ./fetch-docs.sh):
  - compose/cppreference.yaml
  - compose/x86.yaml
  - compose/tldr.yaml   # tldr-pages PWA

networks:
  caddy:        # ingress: Caddy + everything it reverse-proxies
    name: caddy
  backend:      # services publishing raw host ports (samba, ntp); dhcp uses host networking
    name: backend
