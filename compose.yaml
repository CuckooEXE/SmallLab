# .lab homelab stack -- root compose file.
#
# Service definitions are split one-per-service under compose/ and merged in via the
# `include:` list below. Shared networks are declared here so every service can join them.
# Runtime state is bind-mounted under volumes/ (git-ignored); checked-in config lives
# under config/.
#
# Bring it up from THIS directory (it auto-discovers compose.yaml and reads .env):
#   docker compose up -d
#   ./bootstrap.sh

name: lab

include:
  - compose/caddy.yaml
  - compose/step-ca.yaml
  - compose/homepage.yaml
  - compose/technitium.yaml
  - compose/ntp.yaml
  - compose/dhcp.yaml   # opt-in: only starts under `--profile dhcp` (see compose/dhcp.yaml)
  - compose/forgejo.yaml
  - compose/forgejo-runner.yaml   # Forgejo Actions CI runner (registers in bootstrap.sh)
  - compose/minio.yaml
  - compose/samba.yaml
  - compose/filebrowser.yaml
  - compose/webdav.yaml
  - compose/cyberchef.yaml
  - compose/it-tools.yaml
  - compose/devdocs.yaml
  - compose/drawio.yaml
  - compose/privatebin.yaml
  - compose/vaultwarden.yaml
  - compose/dozzle.yaml
  - compose/compiler-explorer.yaml # Godbolt -- source to asm
  - compose/code-control.yaml      # on-demand code-server workspaces (code.lab + *.code.lab)
  - compose/term-control.yaml      # on-demand browser terminals (terminal.lab + *.terminal.lab)
  - compose/opengrok.yaml          # code search + cross-reference over local repos (./ingest-repos.sh)
  # Offline programming references (content staged by ./fetch-docs.sh):
  - compose/cppreference.yaml
  - compose/x86.yaml
  - compose/tldr.yaml   # tldr-pages PWA (built static site, not a plain-HTML mirror)

networks:
  # Ingress: Caddy and every container it reverse-proxies.
  caddy:
    name: caddy
  # Back-of-house: services that publish raw host ports instead of going through Caddy
  # (samba on 445/139, ntp on 123/udp). Kept off the `caddy` ingress network; they reach
  # the LAN through their own published ports, which require a normal, non-internal network
  # -- Docker can't publish host ports through an internal one. (dhcp uses host networking
  # and joins no Docker network at all.)
  backend:
    name: backend
